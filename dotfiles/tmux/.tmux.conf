set -g default-terminal "tmux-256color"
set -ga terminal-features ",tmux-256color:RGB,xterm-256color:RGB,xterm-ghostty:RGB"

set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix
bind C-b send-prefix

set -g mouse on
set -g escape-time 0
set -g history-limit 100000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g detach-on-destroy off
set -g focus-events on

setw -g mode-keys vi
setw -g automatic-rename on
setw -g aggressive-resize on

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind Tab last-window
bind o rotate-window
bind g display-popup -E -w 88% -h 88% "$HOME/.local/bin/terminal-guide"
bind f display-popup -E -w 70% -h 70% "$HOME/.local/bin/tmux-sessionizer"
bind ? display-popup -E -w 72% -h 68% "$HOME/.local/bin/terminal-hints"
bind -n C-g display-popup -E -w 72% -h 68% "$HOME/.local/bin/terminal-hints"
bind -n M-g display-popup -E -w 72% -h 68% "$HOME/.local/bin/terminal-hints"

set -g pane-border-style "fg=#d8cdbb"
set -g pane-active-border-style "fg=#8b5e34"
set -g message-style "fg=#2c241b,bg=#eadfcf"
set -g mode-style "fg=#2c241b,bg=#ddc8a8"
set -g status-position top
set -g status-justify left
set -g status-style "fg=#5d5146,bg=#f7f1e3"
set -g status-left-length 40
set -g status-right-length 100
set -g status-left "#[fg=#2c241b,bg=#e8dcc7,bold]  #S  #[fg=#e8dcc7,bg=#f7f1e3,nobold]"
set -g status-right "#[fg=#8b5e34]#{?window_zoomed_flag, zoom ,}#[fg=#9a8772]%a %b %d #[fg=#5d5146,bold]%H:%M "
set -g window-status-format "#[fg=#9a8772] #I #W "
set -g window-status-current-format "#[fg=#2c241b,bg=#eadfcf,bold] #I #W "
set -g window-status-separator ""
